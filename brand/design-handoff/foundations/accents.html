<!-- @dsCard group="Foundations" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vitya Labs — Project accents</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{--background:#0c0e10;--text:#eeeef0;--muted:#aaabad;--outline:rgba(116,117,120,0.18);--primary:#ff914d}
  *{box-sizing:border-box}
  body{margin:0;padding:32px;font-family:"Manrope",sans-serif;color:var(--text);
    background:radial-gradient(circle at top left,rgba(255,145,77,.14),transparent 30%),linear-gradient(180deg,#090a0b,var(--background) 30%,#090a0b)}
  h2{font-family:"Space Grotesk",sans-serif;letter-spacing:-.03em;margin:0 0 4px}
  .eyebrow{font-family:"Space Grotesk",sans-serif;font-size:.72rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--primary);margin:0 0 20px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px}
  .card{position:relative;overflow:hidden;padding:18px;border-radius:24px;border:1px solid var(--outline);
    background:linear-gradient(180deg,rgba(23,26,28,.92),rgba(17,20,22,.95))}
  .card::after{content:"";position:absolute;inset:auto -20% -40% auto;width:11rem;height:11rem;border-radius:999px;
    background:radial-gradient(circle,color-mix(in srgb,var(--a) 34%,transparent),transparent 68%);pointer-events:none}
  .kick{position:relative;z-index:1;font-family:"Space Grotesk",sans-serif;font-size:.7rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--a)}
  .name{position:relative;z-index:1;font-family:"Space Grotesk",sans-serif;font-size:1.35rem;letter-spacing:-.03em;margin:6px 0 14px}
  .hex{position:relative;z-index:1;display:inline-flex;align-items:center;gap:8px;font-size:.82rem;color:var(--muted);font-variant-numeric:tabular-nums}
  .dot{width:14px;height:14px;border-radius:999px;background:var(--a)}
</style>
</head>
<body>
  <p class="eyebrow">Foundations · Per-project accent</p>
  <h2>Six flagships, one warm-dark base</h2>
  <div class="grid">
    <div class="card" style="--a:#e8835f"><div class="kick">Home Ops SaaS</div><div class="name">HOME</div><div class="hex"><span class="dot"></span>#e8835f</div></div>
    <div class="card" style="--a:#ff914d"><div class="kick">Community BBQ</div><div class="name">GrillHub</div><div class="hex"><span class="dot"></span>#ff914d</div></div>
    <div class="card" style="--a:#0d6b9a"><div class="kick">Utility dashboard</div><div class="name">CICI</div><div class="hex"><span class="dot"></span>#0d6b9a</div></div>
    <div class="card" style="--a:#ffd176"><div class="kick">AI sommelier</div><div class="name">EnerGourmet</div><div class="hex"><span class="dot"></span>#ffd176</div></div>
    <div class="card" style="--a:#7ec8ff"><div class="kick">Shopping optimizer</div><div class="name">Shopper24</div><div class="hex"><span class="dot"></span>#7ec8ff</div></div>
    <div class="card" style="--a:#ffb66b"><div class="kick">Personal puzzle</div><div class="name">Vitya's Life</div><div class="hex"><span class="dot"></span>#ffb66b</div></div>
  </div>
</body>
</html>
