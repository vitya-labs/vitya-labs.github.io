document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

erű copy — a primary CTA marad narancs.\", sb2_btn: \"Dashboard megnyitása\",\n        bc_h: \"Brand check — indítás előtt\",\n        bc1: \"Space Grotesk + Manrope betöltve\", bc2: \"Egy akcent beállítva\", bc3: \"Pill-radius a gombokon/tageken\", bc4: \"Akcent-kontraszt ellenőrizve\", bc5: \"Glow + rise-in jelen van\",\n      },\n      en: {\n        cov_eyebrow: \"Independent software workshop · finalized\",\n        cov_h1: \"Warm-dark core, one signal, every project.\",\n        cov_lead: \"A portable design system finalized from the Vitya Labs flagship repos. Near-black warm base, orange signal, Space Grotesk + Manrope, pill geometry — one token source that emits CSS variables and a Tailwind preset across static HTML, React, Flask/Jinja and Expo.\",\n        cov_p1: \"build fast, keep taste\",\n        cov_p2: \"personal need first\",\n        cov_p3: \"ship weird things\",\n        s1_kick: \"01 · Resolved\", s1_h2: \"Open decisions, closed\",\n        s1_c1_l: \"Mode\", s1_c1_t: \"Two modes, one base\", s1_c1_b: \"Warm-dark is canonical. An official light mode ships for utility dashboards. The saturated cream/pixel world stays an expressive sub-brand for games only.\",\n        s1_c2_l: \"Wordmark\", s1_c2_t: \"Display = Vitya Labs\", s1_c2_b: \"Two-word display name. vitya-labs stays a slug, vityalabs a domain/package. Technical forms are never a display mark.\",\n        s1_c3_l: \"Accent\", s1_c3_t: \"One accent per project\", s1_c3_b: \"The base carries a single --project-accent, warm or cool, mixed in via color-mix. Cool blues hold on the warm-dark base.\",\n        s2_kick: \"02 · Foundations\", s2_h2: \"Color\",\n        sub_neutral_dark: \"Neutrals · warm-dark (canonical)\",\n        sub_neutral_light: \"Neutrals · light (official, tamed-warm)\",\n        sub_signal: \"Brand signal\", sw_gradient: \"primary gradient\",\n        sub_state: \"State\", sub_state_note: \"— new, both modes\",\n        sub_dataviz: \"Data-viz\", sub_dataviz_note: \"— new · categorical + sequential\",\n        s3_kick: \"03 · Foundations\", s3_h2: \"Type\",\n        type_h2: \"Active projects\", type_h3: \"Build fast, keep taste\",\n        type_eyebrow: \"Independent software workshop\",\n        type_body: \"Vitya Labs is a personal software workshop for useful, sometimes weird, always buildable projects. Manrope, 1rem, line-height 1.72 — the base layer of body copy.\",\n        type_small: \"Smaller supporting text — the meta and label layer.\",\n        s4_kick: \"04 · Foundations\", s4_h2: \"Spacing, radius & elevation\",\n        sub_space: \"Spacing scale\", sub_space_note: \"— new · 4px base\", sub_radius: \"Radius & elevation\",\n        s5_kick: \"05 · System\", s5_h2: \"Per-project accent\",\n        s5_intro: \"Six flagships, one warm-dark base. Set --project-accent per scope; everything else stays constant. The live tile below follows the accent tweak.\",\n        cat_home: \"Home ops SaaS\", cat_grill: \"Community BBQ\", cat_toto: \"Animal rescue\", cat_energ: \"AI sommelier\", cat_shop: \"Shopping optimizer\", cat_life: \"Personal puzzle\",\n        s5_live: \"Live\", s5_live_h: \"Same base, one variable swapped\", s5_btn: \"Primary link\", s5_chip: \"accent chip\", s5_bullet: \"bullet\",\n        s6_kick: \"06 · Library\", s6_h2: \"Components\",\n        sub_topbar: \"Topbar\", nav_projects: \"Projects\", nav_about: \"About\",\n        sub_hero: \"Hero\", hero_eyebrow: \"Independent software workshop\", hero_h: \"A project lab for ideas that refused to stay in draft.\",\n        hero_lead: \"Useful, sometimes weird, always buildable projects — one personal org, 100% out of curiosity.\",\n        hero_btn1: \"Our projects\", hero_btn2: \"GitHub org\", hero_stat1: \"featured projects\", hero_stat2: \"personal org\",\n        sub_btns: \"Buttons · tags · stat\", btn_small: \"Small outline\", btn_disabled: \"Disabled\", tag_active: \"active\",\n        stat1: \"featured projects\", stat2: \"personal org\", stat3: \"out of curiosity\",\n        sub_project: \"Project card · featured / standard / half / wide\",\n        pc_feat_kick: \"Featured · Community BBQ\", pc_feat_body: \"A community app built for organizing cook-outs — events, recipes, invites and shopping lists in one workflow.\", pc_feat_btn: \"Open project\",\n        pc_toto_kick: \"Half · Community\", pc_toto_body: \"Reporting and finding lost and stray animals together, on a live community map.\",\n        pc_energ_kick: \"Half · AI\", pc_energ_body: \"A bilingual energy-drink “sommelier”, delivered with a straight face.\",\n        pc_shop_kick: \"Wide · Shopping optimizer\", pc_shop_body: \"A shopping optimizer with a store map — the wide variant is horizontal, media-free, with a meta list.\",\n        pc_shop_li1: \"Flask backend\", pc_shop_li2: \"store map\", pc_shop_li3: \"route optimizer\",\n        sub_principle: \"Principle cards\",\n        pr1_t: \"Build fast, keep taste\", pr1_b: \"Speed matters, but the look and the feel are part of the product too.\",\n        pr2_t: \"Personal need first\", pr2_b: \"Most projects start from “it would be nice if this already existed”.\",\n        pr3_t: \"Ship weird things\", pr3_b: \"Being useful isn't enough; it can be memorable, witty, a little absurd.\",\n        sub_forms: \"Form controls\", note_new: \"— new\",\n        form_input_ph: \"project name\", form_focused: \"Focused\", form_danger_v: \"invalid\", form_on: \"on\", form_off: \"off\",\n        sub_alert: \"Alert & toast\",\n        al_success_t: \"Saved successfully\", al_success_b: \"The project accent was updated.\",\n        al_warn_t: \"Warning\", al_warn_b: \"Check the contrast in light mode.\",\n        al_danger_t: \"Error\", al_danger_b: \"The token source could not load.\",\n        al_toast_b: \"Saved — undo\",\n        sub_table: \"Table & dashboard tile\", tbl_h1: \"Project\", tbl_h3: \"Status\", tile_title: \"Monthly usage\",\n        sub_footer: \"Footer\", ft_kick: \"Next node\", ft_h: \"Let's build something weird.\", ft_btn2: \"Contact\",\n        s7_kick: \"07 · Identity\", s7_h2: \"Wordmark & logo\",\n        wm_clear_l: \"Mark + clear-space\", wm_clear_b: \"Clear-space = half the mark diameter on all sides. Min size 28px. The gold ring + inner glow are part of the mark.\",\n        wm_mono_l: \"Monogram fallback\", wm_mono_b: \"No logo asset → Space Grotesk monogram in the project accent.\",\n        wm_rules_l: \"Naming rules\",\n        wm_r1: \"— display\", wm_r2: \"— lowercase in-body\", wm_r3: \"— slug only\", wm_r4: \"— domain/package\", wm_r5: \"tech forms as display mark\",\n        s8_kick: \"08 · Playbook\", s8_h2: \"New project, same brand\",\n        s8_intro: \"Every new Vitya Labs product starts from the same base. The recipe is simple: the brand layer is locked, the product layer is tunable. Turn a single dial — --project-accent — and the user instantly feels: same family, different product.\",\n        lock_h: \"🔒 Locked — the brand\",\n        lock1: \"Warm-dark base\", lock1_note: \"(or the official light)\",\n        lock2: \"Space Grotesk + Manrope, tight tracking\", lock3: \"Pill geometry + radius scale (18/24/32)\",\n        lock4: \"Orange primary as a present signal\", lock5: \"Glow atmosphere + rise-in entrance\", lock6: \"Wordmark: display = Vitya Labs\",\n        flex_h: \"🎛 Tunable — the product\",\n        flex1: \"--project-accent — warm or cool\", flex2: \"Mode: dark-warm or the official light\",\n        flex3: \"Glow intensity, ambient blob weight\", flex4: \"Media style: photo, gradient or illustration\",\n        flex5: \"Kicker copy tone + monogram\", flex6: \"For games: optional playful sub-brand\",\n        acc_by_cat: \"Accent by category\",\n        warm_h: \"Warm accent\", warm_b: \"For community, consumer, lifestyle and playful products — GrillHub, HOME, Vitya’s Life. Energetic, close, human.\",\n        cool_h: \"Cool accent\", cool_b: \"For utility, data and dashboard products — Shopper24. Calm, precise, trust-building. Orange primary stays present as the CTA.\",\n        gold_h: \"Gold / premium\", gold_b: \"For AI, curatorial or “special” products — EnerGourmet. The gold tertiary lifts the tier, used sparingly.\",\n        contrast_note: \"Rule of thumb for contrast: the accent should be strong enough on the warm-dark base (WCAG AA for large text / UI). If an accent is too dark — e.g. a deep blue on the warm-dark base — use a lighter shade (color-mix … white) for the kicker and bullet, and keep the deep color for the glow.\",\n        same_kick: \"Same brand — different product\",\n        same_intro: \"Identical structure, typography and shape; only the accent and the tone differ. The two clearly belong to one family.\",\n        sb1_kick: \"Community BBQ\", sb1_h: \"Let's grill together.\", sb1_b: \"Warm accent, energetic casual copy — a communal, invite-driven mood.\", sb1_btn: \"Start an event\",\n        sb2_kick: \"Utility dashboard\", sb2_h: \"Bills, made clear.\", sb2_b: \"Cool accent, calm, matter-of-fact copy — the primary CTA stays orange.\", sb2_btn: \"Open dashboard\",\n        bc_h: \"Brand check — before launch\",\n        bc1: \"Space Grotesk + Manrope loaded\", bc2: \"One accent set\", bc3: \"Pill radius on buttons/tags\", bc4: \"Accent contrast checked\", bc5: \"Glow + rise-in present\",\n      },\n    };\n\n    const accents = {\n      home: { hex: \"#e8835f\", label: \"HOME\" },\n      grillhub: { hex: \"#ff914d\", label: \"GrillHub\" },\n      toto: { hex: \"#fd9000\", label: \"TOTO\" },\n      energourmet: { hex: \"#ffd176\", label: \"EnerGourmet\" },\n      shopper24: { hex: \"#7ec8ff\", label: \"Shopper24\" },\n      \"vityas-life\": { hex: \"#ffb66b\", label: \"Vitya's Life\" },\n    };\n    const a = accents[this.props.accent] || accents.grillhub;\n    const spaceScale = [\n      { step: 1, px: \"4px\" }, { step: 2, px: \"8px\" }, { step: 3, px: \"12px\" },\n      { step: 4, px: \"16px\" }, { step: 5, px: \"24px\" }, { step: 6, px: \"32px\" },\n      { step: 7, px: \"48px\" }, { step: 8, px: \"64px\" }, { step: 9, px: \"96px\" },\n    ];\n\n    const lang = this.state.lang;\n    const segOn = \"min-width:42px;padding:6px 12px;border:0;border-radius:999px;cursor:pointer;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:.78rem;letter-spacing:.06em;background:linear-gradient(135deg,#ff914d,#f38239);color:#271200\";\n    const segOff = \"min-width:42px;padding:6px 12px;border:0;border-radius:999px;cursor:pointer;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:.78rem;letter-spacing:.06em;background:transparent;color:#aaabad\";\n\n    return {\n      t: dict[lang],\n      accentHex: a.hex, accentLabel: a.label, spaceScale,\n      setHu: () => this.setState({ lang: \"hu\" }),\n      setEn: () => this.setState({ lang: \"en\" }),\n      huBtnStyle: lang === \"hu\" ? segOn : segOff,\n      enBtnStyle: lang === \"en\" ? segOn : segOff,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
